<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gabarito: Caixa Eletrônico</title>
    <link rel="stylesheet" href="css/caixa.css">
<body>


    <div class="atm-container">
        <h2>Banco Técnico S.A.</h2>
        <div class="screen" id="txtSaldo">R$ 500.00</div>
        
        <input type="number" id="inputValue" placeholder="Digite o valor R$" min="0">
        
        <div class="btn-group">
            <button class="btn-deposit" onclick="depositar()">Depositar</button>
            <button class="btn-withdraw" onclick="sacar()">Sacar</button>
        </div>
        <label for="somando" id="somando"></label>
    </div>
    <script src="js/caixa.js"></script>
</body>
</html>
